spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE,KEY
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    open-in-view: false
  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: test
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000
  refresh-expiration: 604800000

application:
  frontend-url: http://localhost:5173
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
  storage:
    upload-dir: uploads-test
    use-s3: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.taskoryx: WARN
    org.springframework: WARN
    org.hibernate: WARN
