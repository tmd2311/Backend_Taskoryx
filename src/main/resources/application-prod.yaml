spring:
  # ==================== DATABASE ====================
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ==================== JPA ====================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  # ==================== MAIL ====================
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ==================== SERVER ====================
server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

# ==================== JWT ====================
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

# ==================== APPLICATION ====================
application:
  frontend-url: ${FRONTEND_URL}
  cors:
    allowed-origins:
      - ${CORS_ORIGIN_1}
      - ${CORS_ORIGIN_2}
  storage:
    upload-dir: ${UPLOAD_DIR:/home/ubuntu/taskoryx-backend/uploads}

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    com.taskoryx: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: ${LOG_FILE:/home/ubuntu/taskoryx-backend/logs/taskoryx.log}
    max-size: 10MB
    max-history: 30

# ==================== ACTUATOR ====================
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# ==================== SWAGGER (tắt trên production) ====================
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
