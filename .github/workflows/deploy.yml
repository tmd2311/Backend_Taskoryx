name: CI/CD — Test → Build → Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Chạy toàn bộ test suite (H2 in-memory, không cần PostgreSQL)
  # Pipeline dừng tại đây nếu có test nào fail → không build, không deploy
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test --no-transfer-progress

      - name: Upload test reports (kể cả khi fail)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build JAR — chỉ chạy khi test PASS và push lên main
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x mvnw

      - name: Build JAR (skip tests — đã chạy ở job trước)
        run: ./mvnw clean package -DskipTests --no-transfer-progress

      - name: Rename JAR
        run: cp target/*.jar app.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: app.jar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy lên EC2 — chỉ chạy sau khi build thành công
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Copy JAR lên EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "app.jar"
          target: "/home/ubuntu/taskoryx-backend"

      - name: Restart ứng dụng trên EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          command_timeout: 5m
          script: |
            set -e
            APP_DIR=/home/ubuntu/taskoryx-backend
            JAR=$APP_DIR/app.jar
            LOG=$APP_DIR/logs/app.log

            mkdir -p $APP_DIR/logs $APP_DIR/uploads

            # Load biến môi trường từ file .env trên EC2
            export $(grep -v '^#' $APP_DIR/.env | xargs)

            # Dừng instance cũ (nếu có) — gửi SIGTERM để Spring Boot graceful shutdown
            # Dùng pkill thay vì kill để tránh set -e bắt exit code 143
            if pgrep -f "app.jar" > /dev/null 2>&1; then
              OLD_PID=$(pgrep -f "app.jar" | head -1)
              echo "Stopping old process PID=$OLD_PID..."
              kill -15 "$OLD_PID" 2>/dev/null || true
              for i in $(seq 1 10); do
                sleep 1
                kill -0 "$OLD_PID" 2>/dev/null || break
              done
              # Nếu sau 10s vẫn còn sống thì SIGKILL
              kill -0 "$OLD_PID" 2>/dev/null && kill -9 "$OLD_PID" 2>/dev/null || true
            fi

            # Khởi động instance mới
            echo "Starting new instance..."
            nohup java \
              -Xms256m -Xmx512m \
              -Dspring.profiles.active=prod \
              -jar $JAR \
              > $LOG 2>&1 &

            NEW_PID=$!
            echo "Started with PID=$NEW_PID"

            # Health check — script SSH đang chạy trên EC2
            # nên gọi localhost:8080 là đúng (tức là app vừa start trên EC2)
            echo "Waiting for health check..."
            for i in $(seq 1 18); do
              sleep 10
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/actuator/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (attempt $i)!"
                exit 0
              fi
              echo "  Attempt $i/18: HTTP $STATUS"
            done

            echo "ERROR: App không khởi động sau 180s"
            tail -50 $LOG
            exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: Smoke Test — Newman gọi API thật trên EC2 sau khi deploy xong
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test API
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman smoke tests
        run: |
          newman run postman_collection.json \
            --environment postman_environment.json \
            --env-var "base_url=http://${{ secrets.EC2_HOST }}:8080/api" \
            --bail \
            --timeout-request 10000
